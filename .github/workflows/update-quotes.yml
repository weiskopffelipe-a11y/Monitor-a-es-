name: Atualizar cotações da carteira

on:

  schedule:

    - cron: '15 21 * * 1-5'

  workflow_dispatch: {}

permissions:

  contents: write

jobs:

  update-quotes:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar o repositório

        uses: actions/checkout@v4

      - name: Preparar Python

        uses: actions/setup-python@v5

        with:

          python-version: '3.11'

      - name: Instalar dependências

        run: pip install requests

      - name: Buscar cotações e atualizar index.html

        env:

          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}

          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}

        run: python update_quotes.py

      - name: Publicar mudança (se houver)

        run: |

          git config user.name "bot-cotacoes"

          git config user.email "bot@users.noreply.github.com"

          git add index.html

          git diff --staged --quiet && echo "Nada mudou hoje." || git commit -m "Atualiza cotacoes $(date -u +%d/%m/%Y)"

          git push

